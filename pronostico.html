<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pronostico Mondiali 2026</title>
  <link rel="stylesheet" href="css/styles.css">
</head>

<body class="prediction-reset-page">
  <header>
    <nav class="page-links" aria-label="Sezioni">
      <a class="page-link" href="index.html">Convocati</a>
      <a class="page-link active" href="pronostico.html">Pronostico</a>
      <a class="page-link" href="arbitri.html">Arbitri</a>
    </nav>
  </header>

  <main class="prediction-reset-shell" aria-label="Nuovo pronostico">
    <section class="prediction-standings-layout" aria-label="Classifiche pronostico">
      <div class="prediction-groups-section" aria-label="Classifiche gironi modificabili">
        <div class="prediction-section-head">
          <span>Fase a gironi</span>
          <h2>12 gironi</h2>
        </div>
        <div id="prediction-groups-grid" class="prediction-groups-grid"></div>
      </div>

      <aside class="prediction-thirds-section" aria-label="Classifica terzi posti">
        <div class="prediction-section-head">
          <span>Ripescaggi</span>
          <h2>Terzi posti</h2>
        </div>
        <div id="prediction-thirds-table" class="prediction-thirds-table"></div>
      </aside>
    </section>

    <section class="prediction-bracket-section" aria-label="Tabellone pronostico">
      <div class="prediction-section-head prediction-bracket-head">
        <span>Tabellone</span>
        <h2>World Champions</h2>
      </div>
      <div id="prediction-bracket" class="prediction-bracket"></div>
    </section>
  </main>

  <footer>
    Mondiali 2026
  </footer>

  <script src="js/data.js"></script>
  <script src="js/pronostico.js"></script>
</body>
</html>
